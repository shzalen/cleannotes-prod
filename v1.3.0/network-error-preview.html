<!DOCTYPE html>
<html lang="zh-CN" data-theme="tencent">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Network Error Preview</title>
<style>
  :root {
    --color-primary: #0052D9;
    --color-danger: #D54941;
    --color-text-1: #0f172a;
    --color-text-3: #64748b;
    --color-bg-1: #f8f9fc;
    --color-bg-3: #f9fafb;
    --color-surface: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; }
  body { background: var(--color-bg-1); }

  .network-error-page {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--color-bg-1);
    z-index: 100;
    padding: 24px;
    animation: error-fade-in 0.35s ease-out;
  }
  @keyframes error-fade-in {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .network-error__content {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }
  .network-error__icon {
    width: 88px;
    height: 88px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: var(--color-bg-3);
    color: var(--color-text-3);
    margin-bottom: 28px;
  }
  .network-error__icon svg { width: 44px; height: 44px; }
  .network-error__title { margin: 0 0 10px; font-size: 18px; font-weight: 600; color: var(--color-text-1); }
  .network-error__hint { margin: 0 0 36px; font-size: 14px; color: var(--color-text-3); line-height: 1.5; }
  .network-error__btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 13px 44px;
    background: var(--color-primary);
    color: #fff;
    font-size: 15px;
    font-weight: 500;
    border: none;
    border-radius: 24px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.12s;
    -webkit-tap-highlight-color: transparent;
    min-width: 148px;
    min-height: 48px;
  }
  .network-error__btn:active { opacity: 0.85; transform: scale(0.97); }
  .network-error__btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
</style>
</head>
<body>
  <div class="network-error-page">
    <div class="network-error__content">
      <div class="network-error__icon">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 24 Q32 4 56 24" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" opacity="0.25" />
          <path d="M16 32 Q32 18 48 32" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" opacity="0.4" />
          <path d="M24 40 Q32 32 40 40" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" opacity="0.6" />
          <circle cx="32" cy="48" r="4" fill="currentColor" />
          <line x1="20" y1="10" x2="44" y2="52" stroke="var(--color-danger)" stroke-width="3" stroke-linecap="round" />
        </svg>
      </div>
      <h1 class="network-error__title">网络开小差了</h1>
      <p class="network-error__hint">请检查网络连接后重试</p>
      <button class="network-error__btn">重新加载</button>
    </div>
  </div>
</body>
</html>
