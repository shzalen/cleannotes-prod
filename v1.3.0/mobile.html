<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="清记" />
    <meta name="theme-color" content="#0052D9" />
    <link rel="manifest" href="./manifest.json" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' https:; font-src 'self' data: https://at.alicdn.com; frame-src 'self'; worker-src 'self' blob:;" />
    <title>清记</title>
  </head>
  <body>
    <div id="app">
      <!-- PWA 启动骨架屏：JS 加载前立即可见，Vue mount 后自动替换 -->
      <div id="app-splash" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fff;z-index:9999;">
        <div style="width:64px;height:64px;border-radius:14px;background:#0052D9;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff;font-family:system-ui,sans-serif;">清</div>
        <div style="margin-top:16px;width:28px;height:28px;border:3px solid #e8ebef;border-top-color:#0052D9;border-radius:50%;animation:splash-spin 0.8s linear infinite;"></div>
      </div>
      <style>#app-splash{opacity:1;transition:opacity 0.2s}@keyframes splash-spin{to{transform:rotate(360deg)}}</style>
    </div>
    <script type="module" src="/src/mobile.ts"></script>
  </body>
</html>
