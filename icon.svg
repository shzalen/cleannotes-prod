<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 680">
  <defs>
    <clipPath id="s">
      <rect width="680" height="680" rx="136"/>
    </clipPath>
  </defs>
  <g clip-path="url(#s)">
    <!-- 背景 -->
    <rect width="680" height="680" fill="#0052D9"/>
    <circle cx="140" cy="540" r="220" fill="#2B7AFF" opacity="0.45"/>
    <circle cx="520" cy="160" r="100" fill="#629FFF" opacity="0.35"/>
    <!-- 装饰圆点 -->
    <g fill="#FFFFFF" opacity="0.12">
      <circle cx="520" cy="80" r="5"/>
      <circle cx="600" cy="100" r="3"/>
      <circle cx="580" cy="160" r="4"/>
      <circle cx="620" cy="220" r="3"/>
      <circle cx="100" cy="580" r="4"/>
      <circle cx="80" cy="620" r="3"/>
      <circle cx="160" cy="620" r="5"/>
      <circle cx="480" cy="580" r="3"/>
      <circle cx="560" cy="620" r="3"/>
    </g>

    <!-- 笔记本主体 — 竖版，高>宽 -->
    <g transform="translate(48, 53) scale(0.85)">
      <!-- 底层：粉色笔记本 -->
      <g transform="translate(180, 110) rotate(-6, 170, 245)">
        <rect width="340" height="490" rx="14" fill="#F5C4B3"/>
        <rect x="6" y="6" width="328" height="478" rx="12" fill="#FAECE7"/>
        <line x1="40" y1="55" x2="300" y2="55" stroke="#F5C4B3" stroke-width="2"/>
        <line x1="40" y1="105" x2="280" y2="105" stroke="#F5C4B3" stroke-width="2"/>
        <line x1="40" y1="155" x2="300" y2="155" stroke="#F5C4B3" stroke-width="2"/>
        <line x1="40" y1="205" x2="260" y2="205" stroke="#F5C4B3" stroke-width="2"/>
        <line x1="40" y1="255" x2="290" y2="255" stroke="#F5C4B3" stroke-width="2"/>
        <line x1="40" y1="305" x2="310" y2="305" stroke="#F5C4B3" stroke-width="2"/>
        <line x1="40" y1="355" x2="270" y2="355" stroke="#F5C4B3" stroke-width="2"/>
        <line x1="40" y1="405" x2="300" y2="405" stroke="#F5C4B3" stroke-width="2"/>
        <line x1="40" y1="455" x2="280" y2="455" stroke="#F5C4B3" stroke-width="2"/>
      </g>

      <!-- 中层：蓝色笔记本 -->
      <g transform="translate(175, 105) rotate(-3, 170, 245)">
        <rect width="340" height="490" rx="14" fill="#85B7EB"/>
        <rect x="6" y="6" width="328" height="478" rx="12" fill="#E6F1FB"/>
        <line x1="40" y1="50" x2="300" y2="50" stroke="#B5D4F4" stroke-width="2"/>
        <line x1="40" y1="95" x2="270" y2="95" stroke="#B5D4F4" stroke-width="2"/>
        <line x1="40" y1="140" x2="300" y2="140" stroke="#B5D4F4" stroke-width="2"/>
        <line x1="40" y1="185" x2="240" y2="185" stroke="#B5D4F4" stroke-width="2"/>
        <line x1="40" y1="230" x2="290" y2="230" stroke="#B5D4F4" stroke-width="2"/>
        <line x1="40" y1="275" x2="310" y2="275" stroke="#B5D4F4" stroke-width="2"/>
        <line x1="40" y1="320" x2="260" y2="320" stroke="#B5D4F4" stroke-width="2"/>
        <line x1="40" y1="365" x2="300" y2="365" stroke="#B5D4F4" stroke-width="2"/>
        <line x1="40" y1="410" x2="280" y2="410" stroke="#B5D4F4" stroke-width="2"/>
        <line x1="40" y1="455" x2="300" y2="455" stroke="#B5D4F4" stroke-width="2"/>
      </g>

      <!-- 顶层：白色笔记本 -->
      <g transform="translate(170, 100)">
        <rect width="340" height="490" rx="14" fill="#D3D1C7"/>
        <rect x="4" y="4" width="332" height="482" rx="12" fill="#FFFFFF"/>

        <!-- 横线 -->
        <line x1="40" y1="55" x2="300" y2="55" stroke="#E8E6DE" stroke-width="2"/>
        <line x1="40" y1="105" x2="290" y2="105" stroke="#E8E6DE" stroke-width="2"/>
        <line x1="40" y1="155" x2="310" y2="155" stroke="#E8E6DE" stroke-width="2"/>
        <line x1="40" y1="205" x2="280" y2="205" stroke="#E8E6DE" stroke-width="2"/>
        <line x1="40" y1="255" x2="300" y2="255" stroke="#E8E6DE" stroke-width="2"/>
        <line x1="40" y1="305" x2="310" y2="305" stroke="#E8E6DE" stroke-width="2"/>
        <line x1="40" y1="355" x2="270" y2="355" stroke="#E8E6DE" stroke-width="2"/>
        <line x1="40" y1="405" x2="300" y2="405" stroke="#E8E6DE" stroke-width="2"/>
        <line x1="40" y1="455" x2="290" y2="455" stroke="#E8E6DE" stroke-width="2"/>

        <!-- 红色边距线 -->
        <line x1="32" y1="18" x2="32" y2="472" stroke="#E24B4A" stroke-width="3"/>

        <!-- 已勾选框 -->
        <rect x="48" y="42" width="26" height="26" rx="5" fill="none" stroke="#639922" stroke-width="3"/>
        <polyline points="55,55 62,64 73,48" fill="none" stroke="#639922" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

        <!-- 未勾选框 -->
        <rect x="48" y="92" width="26" height="26" rx="5" fill="none" stroke="#D3D1C7" stroke-width="3"/>
        <line x1="48" y1="105" x2="74" y2="105" stroke="#E8E6DE" stroke-width="2"/>

        <!-- 优先级事项（彩色圆点） -->
        <circle cx="61" cy="142" r="10" fill="#D85A30"/>
        <line x1="85" y1="142" x2="280" y2="142" stroke="#E8E6DE" stroke-width="2"/>

        <circle cx="61" cy="192" r="10" fill="#EF9F27"/>
        <line x1="85" y1="192" x2="250" y2="192" stroke="#E8E6DE" stroke-width="2"/>

        <circle cx="61" cy="242" r="10" fill="#639922"/>
        <line x1="85" y1="242" x2="290" y2="242" stroke="#E8E6DE" stroke-width="2"/>

        <circle cx="61" cy="292" r="10" fill="#534AB7"/>
        <line x1="85" y1="292" x2="240" y2="292" stroke="#E8E6DE" stroke-width="2"/>

        <circle cx="61" cy="342" r="10" fill="#0052D9"/>
        <line x1="85" y1="342" x2="270" y2="342" stroke="#E8E6DE" stroke-width="2"/>
